<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Book - Register</title>

    <!-- Fonts used by the top banner. -->
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Lustria&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

    <!-- Registration page scripts. Password hashing is handled by the PHP API, not the frontend. -->
    <script type="text/javascript" src="js/config.js"></script>
    <script type="text/javascript" src="js/api.js"></script>
    <script type="text/javascript" src="js/session.js"></script>
    <script type="text/javascript" src="js/auth.js"></script>
</head>

<body class="registerPage">
	<div class="topBanner">
		<h1><a href="index.html">Contact Book</a></h1>
	</div>

	<div id="registerDiv">
		<span id="inner-title">Create Account</span>
		<p class="formHelp">Sign up to start saving your personal contacts.</p>

		<label for="registerFirstName">First Name</label>
		<input type="text" id="registerFirstName" placeholder="First Name" autocomplete="given-name" onkeydown="registerOnEnter(event);"><br>

		<label for="registerLastName">Last Name</label>
		<input type="text" id="registerLastName" placeholder="Last Name" autocomplete="family-name" onkeydown="registerOnEnter(event);"><br>

		<label for="registerLogin">Username</label>
		<input type="text" id="registerLogin" placeholder="Username" autocomplete="username" onkeydown="registerOnEnter(event);"><br>

		<label for="registerPassword">Password</label>
        <input type="password" 
            id="registerPassword"
            placeholder="Password"
            autocomplete="new-password"
            oninput="checkRegisterPasswords();" 
            onkeydown="registerOnEnter(event);"><br>

        <label for="registerConfirmPassword">Confirm Password</label>
        <input type="password"
            id="registerConfirmPassword"
            placeholder="Confirm Password"
            autocomplete="new-password"
            oninput="checkRegisterPasswords();" 
            onkeydown="registerOnEnter(event);"><br>

		<button type="button" id="registerButton" class="buttons" onclick="doRegister();">Create Account</button>
		<span id="registerResult" aria-live="polite"></span>
		<a id="backToLoginLink" href="index.html">Back to Login</a>
	</div>
</body>
</html>
