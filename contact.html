<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Book - Contacts</title>
	<script type="text/javascript" src="js/code.js"></script>
	<link href="css/styles.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Lustria&display=swap" rel="stylesheet">

	<script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function()
	{
		readCookie();
		showEmptyContacts();
	}, false);
	</script>
</head>
<body class="dashboardPage">

<div class="topBanner">Contact Book</div>

<div class="dashboardShell">
	<div class="dashboardHeader">
		<div>
			<h1>My Contacts</h1>
			<span id="userName"></span>
		</div>
		<button type="button" id="logoutButton" onclick="doLogout();">Logout</button>
	</div>

	<div class="dashboardTools">
		<label for="contactSearchText">Search Contacts</label>
		<div class="searchRow">
			<input type="text" id="contactSearchText" placeholder="Search by name, phone, or email">
			<button type="button" id="searchContactButton" onclick="searchContacts();">Search</button>
		</div>
		<span id="contactSearchResult" aria-live="polite"></span>
	</div>

	<div class="contactActions">
		<button type="button" id="addContactButton" onclick="showAddContactMessage();">Add Contact</button>
		<button type="button" id="editContactButton" onclick="showEditContactMessage();">Edit Contact</button>
		<button type="button" id="deleteContactButton" onclick="showDeleteContactMessage();">Delete Contact</button>
	</div>

	<div id="contactListArea">
		<p id="emptyContactsMessage">No contacts yet. Add your first contact to get started.</p>
		<div id="contactList"></div>
	</div>
</div>

</body>
</html>
