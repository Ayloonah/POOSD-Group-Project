	<meta charset="UTF-8">

	<title>Contact Book - Contacts</title>
	<script type="text/javascript" src="js/code.js"></script>
	<link href="css/styles.css" rel="stylesheet">
	

	<!--Reference to Lustria and Alex Brush font on Google Fonts for the top banner-->
    <link rel="preconnect" href="https://fonts.googleapis.com">

	<script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function()
	{
		readCookie();
		showEmptyContacts();
	}, false);
	</script>

<body class="dashboardPage">

	<div class="topBanner"> 
		<div class="leftTools">
			<div class="searchRow">
				<input type="text" id="contactSearchText" placeholder="Search Contacts..." aria-label="Search Contacts">
				<button type="button" id="searchContactButton" onclick="searchContacts();"> Search</button>
			</div>
		</div>
		<h1>Contact Book</h1>
		<div class="rightTools">
			<button type="button" id="logoutButton" onclick="doLogout();">Logout</button>
		</div>
	</div>

	<div class="contactLayout">

		<aside class="dashboardShell">
			<!--<label for="contactSearchText">Search Contacts</label>--> <!-- Removing label for better UX, but may need to be added back in for accessibility reasons.-->
			
			<span id="contactSearchResult" aria-live="polite"></span>

			<button type="button" id="addContactButton" onclick="showAddContactMessage();">Add Contact</button>
		
		</aside>

		<div class="mainSpace">

			<main class="contactArea">
				<div class="noteCard">
					<p id="emptyContactsMessage">Welcome to your Contact Book! Your contacts will appear here once you select them from the list to your left.</p>
				</div>
			</main>
		</div>	
	</div>
