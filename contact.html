<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Book - Contacts</title>
	<script type="text/javascript" src="js/code.js"></script>
	<link href="css/styles.css" rel="stylesheet">
	

	<!--Reference to Lustria and Alex Brush font on Google Fonts for the top banner-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Lustria&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete" />

	<style>
		.material-symbols-outlined {
			font-variation-settings:
			'FILL' 0,
			'wght' 400,
			'GRAD' 0,
			'opsz' 24
		}
	</style>

	<script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function()
	{
		readCookie();
		showEmptyContacts();
		loadContacts();
	}, false);
	</script>
</head>

<body class="dashboardPage">

	<div class="topBanner"> 
		<div class="leftTools">
			<div class="searchRow">
				<label for="contactSearchText" class="searchLabel">Search Contacts</label>
				<input type="search" id="contactSearchText" placeholder="Search Contacts..." oninput="searchContacts();" onkeydown="searchContactsOnEnter(event);">
				<button type="button" id="searchContactButton" title="Search Contacts" onclick="searchContacts();">
					<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="searchIcon">
						<circle cx="11" cy="11" r="8"></circle>
						<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
					</svg>
				</button>
				<button type="button" id="clearSearchButton" onclick="clearSearch();">Clear</button>
			</div>
		</div>
		<h1><a href="index.html">Contact Book</a></h1>
		<div class="rightTools">
			<span id="userName"></span>
			<button type="button" id="logoutButton" onclick="doLogout();">Logout</button>
		</div>
	</div>

	<div class="contactLayout">

		<aside class="dashboardShell">
			<!--<label for="contactSearchText">Search Contacts</label>--> <!-- Removing label for better UX, but may need to be added back in for accessibility reasons.-->
			<h1 class="contactListHeader">Your Contacts</h1> <!-- WE CAN TRY TO PERSONALIZE THIS LATER, WITH THE USERS NAME NEXT TO "CONTACT" (E.G John's Contacts)-->
			<span id="contactSearchResult" aria-live="polite"></span>
			<div id="contactList"></div>

			<div id="addContactButton-container">
				<button type="button" id="addContactButton" onclick="showAddContactMessage();">Add Contact</button>
			</div>
		
		</aside>

		<div class="mainSpace">

			<main class="contactArea">
				<div class="contactCard">
					<p id="emptyContactsMessage">Welcome to your Contact Book! Your contacts will appear here once you select them from the list to your left.</p>
					<div id="contactCardDetails"></div>

					<div id="addContactForm">
						<h2>Add Contact</h2>

						<label for="contactFirstName">First Name</label>
						<input type="text" id="contactFirstName" placeholder="First Name">

						<label for="contactLastName">Last Name</label>
						<input type="text" id="contactLastName" placeholder="Last Name">

						<label for="contactPhone">Phone</label>
						<input type="tel" id="contactPhone" placeholder="Phone Number" inputmode="numeric" maxlength="10">

						<label for="contactEmail">Email</label>
						<input type="email" id="contactEmail" placeholder="Email Address">

						<div class="formButtonRow">
							<button type="button" id="createContactButton" onclick="createContact();">Save Contact</button>
							<button type="button" id="cancelContactButton" onclick="cancelAddContact();">Cancel</button>
						</div>

						<span id="addContactResult" aria-live="polite"></span>
					</div>

					<div id="editContactForm">
						<h2>Edit Contact</h2>

						<label for="editContactFirstName">First Name</label>
						<input type="text" id="editContactFirstName" placeholder="First Name">

						<label for="editContactLastName">Last Name</label>
						<input type="text" id="editContactLastName" placeholder="Last Name">

						<label for="editContactPhone">Phone</label>
						<input type="tel" id="editContactPhone" placeholder="Phone Number" inputmode="numeric" maxlength="10">

						<label for="editContactEmail">Email</label>
						<input type="email" id="editContactEmail" placeholder="Email Address">

						<div class="formButtonRow">
							<button type="button" id="updateContactButton" onclick="updateContact();">Update Contact</button>
							<button type="button" id="cancelEditContactButton" onclick="cancelEditContact();">Cancel</button>
						</div>

						<span id="editContactResult" aria-live="polite"></span>
					</div>
				</div>
			</main>
		</div>	
	</div>

	<div id="deleteContactForm" role="dialog" aria-modal="true" aria-labelledby="deleteContactTitle">
		<div class="deleteDialogBox">
			<h2 id="deleteContactTitle">Delete Contact</h2>

			<p id="deleteContactText">Are you sure you want to delete this contact?</p>

			<div class="formButtonRow">
				<button type="button" id="confirmDeleteContactButton" onclick="deleteContact();">Delete Contact</button>
				<button type="button" id="cancelDeleteContactButton" onclick="cancelDeleteContact();">Cancel</button>
			</div>

			<span id="deleteContactResult" aria-live="polite"></span>
		</div>
	</div>
